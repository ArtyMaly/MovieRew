{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>КиноОтзыв</title>
    <script>
        (() => {
            'use strict'

            const getStoredTheme = () => localStorage.getItem('theme')
            const setStoredTheme = theme => localStorage.setItem('theme', theme)

            const getPreferredTheme = () => {
                const storedTheme = getStoredTheme()
                if (storedTheme) {
                    return storedTheme
                }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
            }

            const setTheme = theme => {
                if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.setAttribute('data-bs-theme', 'dark')
                } else {
                    document.documentElement.setAttribute('data-bs-theme', theme)
                }
            }

            setTheme(getPreferredTheme())

            window.addEventListener('DOMContentLoaded', () => {
                const themeSwitcher = document.getElementById('bd-theme-toggle')

                if (!themeSwitcher) return;

                themeSwitcher.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-bs-theme')
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light'
                    setStoredTheme(newTheme)
                    setTheme(newTheme)
                })
            })
        })()
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <div class="d-flex align-items-center w-100 gap-2">
                <a class="navbar-brand" href="/">MovieRate</a>>
                <form class="d-flex" action="{% url 'movie_list' %}" method="get">
                    <input class="form-control form-control-sm" type="search" name="q" placeholder="Поиск фильма..." aria-label="Search" value="{{ request.GET.q }}" style="width: 200px;">
                    <button class="btn btn-outline-light btn-sm ms-2" type="submit">Найти</button>
                </form>
                <button class="btn btn-outline-light btn-sm" id="bd-theme-toggle" type="button" aria-label="Переключить тему">
                    <span class="theme-icon-active">🌓 Тема</span>
                </button>

                {% if user.is_authenticated %}
                    <span class="navbar-text">
                        Привет, <a href="{% url 'profile' %}" class="text-white text-decoration-none"><strong>{{ user.username }}</strong></a>
                    </span>
                {% endif %}

                {% if user.is_staff %}
                    <a href="{% url 'add_movie' %}" class="btn btn-success btn-sm">+ Добавить фильм</a>
                {% endif %}
                {% if user.is_authenticated %}
                    <form action="{% url 'logout' %}" method="post" class="ms-auto">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
                    </form>
                {% else %}
                    <div class="ms-auto d-flex gap-2">
                        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Вход</a>
                        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Регистрация</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
